name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write


jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.select.outputs.web }}
      worker: ${{ steps.select.outputs.worker }}
      infra: ${{ steps.select.outputs.infra }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
      - name: Get changed files
        id: diff
        uses: ./.github/actions/get-diff
      - name: Run selective CI
        id: select
        run: uv run --no-project python .github/scripts/selective_ci.py --changed-files-json '${{ steps.diff.outputs.changed_files_json }}' --github-output "$GITHUB_OUTPUT"

  compliance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run compliance checks
        run: ./.github/scripts/run-compliance.sh

  web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    uses: ./.github/workflows/web.yml
    with:
      event_name: ${{ github.event_name }}
    secrets:
      KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}

  worker:
    needs: changes
    if: needs.changes.outputs.worker == 'true'
    uses: ./.github/workflows/worker.yml
    with:
      event_name: ${{ github.event_name }}
    secrets:
      KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}

  infra:
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    uses: ./.github/workflows/infra.yml
    with:
      event_name: ${{ github.event_name }}
    secrets:
      HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
      S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
      CI_SSH_PRIVATE_KEY: ${{ secrets.CI_SSH_PRIVATE_KEY }}
