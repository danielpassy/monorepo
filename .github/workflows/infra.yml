name: Infra

on:
  workflow_call:
    inputs:
      event_name:
        required: true
        type: string
    secrets:
      HCLOUD_TOKEN:
        required: true
      S3_ACCESS_KEY_ID:
        required: true
      S3_SECRET_ACCESS_KEY:
        required: true
      CI_SSH_PRIVATE_KEY:
        required: false

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run infra checks
        run: ./.github/scripts/run-infra.sh

  apply:
    needs: validate
    runs-on: ubuntu-latest
    if: inputs.event_name == 'push'
    environment: production
    defaults:
      run:
        working-directory: infra/terraform
    env:
      TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
      TF_VAR_ssh_allowed_ips: '["0.0.0.0/0"]'
      TF_VAR_ssh_private_key_path: ~/.ssh/monorepo_ci
      AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve -input=false \
            -target=hcloud_firewall.cluster \
            -target=aws_s3_bucket.frontend \
            -target=aws_s3_bucket_acl.frontend
