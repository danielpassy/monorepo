name: Test Environment

on:
  pull_request:
  push:
    branches: [main]

jobs:
  plan:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - run: echo "This is the plan step — no environment needed"

  apply:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - run: echo "This ran after environment approval"
      - run: echo "Secret test — HCLOUD_TOKEN is ${{ secrets.HCLOUD_TOKEN != '' && 'SET' || 'NOT SET' }}"
