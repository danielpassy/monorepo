name: Worker

on:
  workflow_call:

jobs:
  worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
      - name: Run worker tests
        run: ./apps/worker/ci/run-tests.sh
      - name: Run worker project tests
        run: ./apps/worker/ci/run-project-tests.sh
