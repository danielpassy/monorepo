name: Worker

on:
  workflow_call:

jobs:
  worker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      BASE_IMAGE: ghcr.io/danielpassy/monorepo-python-base:docker-ci-cache
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build shared base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/base.Dockerfile
          tags: ${{ env.BASE_IMAGE }}
          push: true
          cache-from: type=gha,scope=monorepo-base
          cache-to: type=gha,mode=max,scope=monorepo-base
      - name: Build worker test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/Dockerfile
          target: test
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}
          tags: monorepo-worker:test
          load: true
          cache-from: type=gha,scope=worker-test
          cache-to: type=gha,mode=max,scope=worker-test
      - name: Run worker tests
        run: docker run --rm monorepo-worker:test
