<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Meet Session Capture</title>
    <style>
      body {
        font-family: sans-serif;
        margin: 12px;
        min-width: 280px;
        line-height: 1.4;
      }

      button {
        display: block;
        width: 100%;
        margin: 8px 0 0;
        padding: 10px 12px;
      }

      .panel {
        margin-bottom: 12px;
        padding: 12px;
        border: 1px solid #d6d6d6;
        border-radius: 8px;
        background: #f8f8f8;
      }

      .warning {
        font-size: 13px;
        color: #5f4a1a;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <div id="tab-warning" class="warning"></div>
    </div>
    <button id="start-session">Iniciar captura da sessao</button>
    <script src="popup.js"></script>
  </body>
</html>
