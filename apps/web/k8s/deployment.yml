apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: monorepo
  labels:
    app: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      initContainers:
        - name: migrate
          image: ghcr.io/danielpassy/monorepo-web:latest
          command: ["uv", "run", "alembic", "-c", "web/migrations/alembic.ini", "upgrade", "head"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: web-secret
                  key: database_url
      containers:
        - name: web
          image: ghcr.io/danielpassy/monorepo-web:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: web-secret
                  key: database_url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-broker-secret
                  key: url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: web-secret
                  key: secret_key
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: web-secret
                  key: google_client_secret
            - name: FRONTEND_URL
              value: "https://app.rafaellapontes.com.br"
            - name: SESSION_COOKIE_DOMAIN
              value: "rafaellapontes.com.br"
            - name: COOKIE_SECURE
              value: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: monorepo
spec:
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 8000
