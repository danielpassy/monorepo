services:
  base:
    image: monorepo-python-base:dev
    build:
      context: .
      dockerfile: docker/base.Dockerfile

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: monorepo
      POSTGRES_PASSWORD: monorepo
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./local/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monorepo"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  web:
    image: monorepo-web:dev
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        BASE_IMAGE: monorepo-python-base:dev
    environment:
      DATABASE_URL: postgresql+asyncpg://monorepo:monorepo@postgres:5432/monorepo
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  worker:
    image: monorepo-worker:dev
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
      args:
        BASE_IMAGE: monorepo-python-base:dev
    environment:
      DATABASE_URL: postgresql+asyncpg://monorepo:monorepo@postgres:5432/worker_app
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
