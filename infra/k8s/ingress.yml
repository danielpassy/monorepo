apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rate-limit
  namespace: monorepo
spec:
  rateLimit:
    average: 30
    period: 1m
    burst: 10
    sourceCriterion:
      ipStrategy:
        depth: 0
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web
  namespace: monorepo
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: monorepo-rate-limit@kubernetescrd
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
