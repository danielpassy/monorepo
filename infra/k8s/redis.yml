apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-broker
  namespace: monorepo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-broker
  template:
    metadata:
      labels:
        app: redis-broker
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args:
            - --requirepass
            - $(REDIS_PASSWORD)
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-broker-secret
                  key: password
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis-broker
  namespace: monorepo
spec:
  selector:
    app: redis-broker
  ports:
    - port: 6379
      targetPort: 6379
